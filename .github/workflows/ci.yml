name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Run tests
        run: npm test

      - name: Verify extension packages
        run: npx --yes @vscode/vsce@latest package --no-dependencies

      - name: Upload VSIX artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v6
        with:
          name: elevator-music-vsix
          path: "*.vsix"
          retention-days: 14

  # After a green build on main, tag package.json's version and publish a GitHub
  # Release when needed. Tags pushed with GITHUB_TOKEN do not trigger other
  # workflows, so we create the release here (release.yml still handles manual tags).
  tag-release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download VSIX
        uses: actions/download-artifact@v6
        with:
          name: elevator-music-vsix

      - name: Tag and publish GitHub Release when version is new
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"

          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release ${TAG}"
            git push origin "$TAG"
            echo "Created tag ${TAG}"
          else
            echo "Tag ${TAG} already exists"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub Release ${TAG} already exists — nothing to do."
            exit 0
          fi

          gh release create "$TAG" *.vsix \
            --title "Hold the Vibe ${TAG}" \
            --generate-notes
          echo "Published GitHub Release ${TAG}"
